<!DOCTYPE html>
<html>
<head>
  <title>Neuro-Traffic | Doctor Panel</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <h1>🚑 Emergency Input Panel</h1>

  <div class="panel">
    <label>Select Patient Condition:</label>
    <select id="condition">
  <option value="cardiac">Cardiac (Heart Attack)</option>
  <option value="neuro">Neuro (Head Injury)</option>
  <option value="trauma">Trauma (Accident)</option>
  <option value="maternity">Pregnancy / Delivery</option>
  <option value="pediatric">Child Emergency</option>
  <option value="general">General Illness</option>
  <option value="pulmonology">Respiratory (Breathing Issue)</option>
<option value="urology">Urology (Kidney/Urinary)</option>

</select>
    </select>

    <br><br>

    <button onclick="startEmergency()">Start Emergency</button>
  </div>

  <script>
    function startEmergency() {
      const condition = document.getElementById("condition").value;
      localStorage.setItem("condition", condition);
      window.location.href = "dashboard.html";
    }
  </script>

</body>
</html>
